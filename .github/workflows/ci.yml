name: CI - Build and Push Images

on:
  workflow_dispatch:
  push:
    branches:
      - Dev1
      - main
  pull_request:
    branches:
      - Dev1
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push user-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/user-service
          file: ./services/user-service/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/user-service:latest

      - name: Build and push product-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/product-service
          file: ./services/product-service/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/product-service:latest

      - name: Build and push order-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/order-service
          file: ./services/order-service/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/order-service:latest

      - name: Build and push api-gateway image
        uses: docker/build-push-action@v5
        with:
          context: ./services/api-gateway
          file: ./services/api-gateway/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/api-gateway:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          build-args: |
            REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/frontend:latest

      - name: Image build  complete
        run: echo "All images built  ${{ secrets.ACR_LOGIN_SERVER }}"
